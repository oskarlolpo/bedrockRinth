name: bedrockRinth Smoke Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-build:
    runs-on: windows-latest

    env:
      FORCE_COLOR: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare app environment
        run: Copy-Item packages/app-lib/.env.staging packages/app-lib/.env

      - name: Fix Gradle wrapper permissions
        shell: bash
        run: |
          if [ -f packages/app-lib/java/gradlew ]; then
            chmod +x packages/app-lib/java/gradlew
          fi

      - name: Build app frontend
        run: pnpm --filter=@modrinth/app-frontend build

      - name: Rust smoke check
        run: cargo check -p theseus_gui
