name: bedrockRinth Smoke Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-build:
    runs-on: ubuntu-latest

    env:
      FORCE_COLOR: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -yq libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare app environment
        run: cp packages/app-lib/.env.staging packages/app-lib/.env

      - name: Build app frontend
        run: pnpm --filter=@modrinth/app-frontend build

      - name: Rust smoke check
        run: cargo check -p theseus_gui
